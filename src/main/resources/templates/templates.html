<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('模板管理')}"></head>
<body>
<div class="d-flex">
    <nav th:replace="~{layout :: nav('templates')}"></nav>
    <div class="main-content flex-grow-1" style="margin-left: 220px; padding: 30px;">

        <h4 class="mb-4">模板管理</h4>
        <div th:replace="~{layout :: alert(${msg}, ${error})}"></div>

        <!-- 添加模板 -->
        <div class="card mb-4">
            <div class="card-body">
                <form class="row g-2 align-items-end" method="post" action="/templates/add">
                    <div class="col-auto">
                        <label class="form-label small text-muted">模板编码</label>
                        <input type="text" name="templateCode" class="form-control" placeholder="TTS_XXXXXXXXX" required>
                    </div>
                    <div class="col-auto">
                        <label class="form-label small text-muted">名称（可选）</label>
                        <input type="text" name="name" class="form-control" placeholder="模板名称">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">添加</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 模板列表 -->
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>模板编码</th>
                        <th>名称</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${templates}">
                        <td th:text="${t.id}"></td>
                        <td><code th:text="${t.templateCode}"></code></td>
                        <td th:text="${t.name ?: '-'}"></td>
                        <td>
                            <span class="badge" th:classappend="${t.enabled} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${t.enabled} ? '启用' : '禁用'"></span>
                        </td>
                        <td th:text="${#temporals.format(t.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <form method="post" th:action="@{/templates/toggle/{id}(id=${t.id})}" style="display:inline">
                                <button type="submit" class="btn btn-sm btn-outline-warning"
                                        th:text="${t.enabled} ? '禁用' : '启用'"></button>
                            </form>
                            <form method="post" th:action="@{/templates/delete/{id}(id=${t.id})}" style="display:inline"
                                  onsubmit="return confirm('确定删除此模板？')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(templates)}">
                        <td colspan="6" class="text-center text-muted py-4">暂无模板</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<script th:replace="~{layout :: script}"></script>
</body>
</html>
