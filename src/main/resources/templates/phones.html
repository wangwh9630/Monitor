<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('号码管理')}"></head>
<body>
<div class="d-flex">
    <nav th:replace="~{layout :: nav('phones')}"></nav>
    <div class="main-content flex-grow-1" style="margin-left: 220px; padding: 30px;">

        <h4 class="mb-4">号码管理</h4>
        <div th:replace="~{layout :: alert(${msg}, ${error})}"></div>

        <!-- 添加号码 -->
        <div class="card mb-4">
            <div class="card-body">
                <form class="row g-2 align-items-end" method="post" action="/phones/add">
                    <div class="col-auto">
                        <label class="form-label small text-muted">添加新号码</label>
                        <input type="text" name="number" class="form-control" placeholder="输入手机号码"
                               pattern="^1[3-9]\d{9}$" required>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">添加</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 号码列表 -->
        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>号码</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${phones}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.number}"></td>
                        <td>
                            <span class="badge" th:classappend="${p.enabled} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${p.enabled} ? '启用' : '禁用'"></span>
                        </td>
                        <td th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td>
                            <form method="post" th:action="@{/phones/toggle/{id}(id=${p.id})}" style="display:inline">
                                <button type="submit" class="btn btn-sm btn-outline-warning"
                                        th:text="${p.enabled} ? '禁用' : '启用'"></button>
                            </form>
                            <form method="post" th:action="@{/phones/delete/{id}(id=${p.id})}" style="display:inline"
                                  onsubmit="return confirm('确定删除此号码？')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(phones)}">
                        <td colspan="5" class="text-center text-muted py-4">暂无号码，请先添加</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<script th:replace="~{layout :: script}"></script>
</body>
</html>
