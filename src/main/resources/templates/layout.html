<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' - Monitor'">Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #1a1a2e; }
        .sidebar a { color: #e0e0e0; text-decoration: none; padding: 12px 20px; display: block; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #16213e; color: #fff; }
        .sidebar .brand { color: #fff; font-size: 1.2rem; font-weight: bold; padding: 20px; border-bottom: 1px solid #16213e; }
        .main-content { background: #f8f9fa; min-height: 100vh; }
        .stat-card { border-left: 4px solid; }
        .stat-card.primary { border-color: #0d6efd; }
        .stat-card.success { border-color: #198754; }
        .stat-card.warning { border-color: #ffc107; }
        .badge-success { background-color: #198754; }
        .badge-failed { background-color: #dc3545; }
    </style>
</head>
<body>

<nav th:fragment="nav(currentPage)" class="sidebar d-flex flex-column" style="width: 220px; position: fixed; top: 0; left: 0; z-index: 100;">
    <div class="brand">Monitor</div>
    <a th:classappend="${currentPage == 'dashboard'} ? 'active'" href="/">仪表盘</a>
    <a th:classappend="${currentPage == 'phones'} ? 'active'" href="/phones">号码管理</a>
    <a th:classappend="${currentPage == 'templates'} ? 'active'" href="/templates">模板管理</a>
    <a th:classappend="${currentPage == 'test'} ? 'active'" href="/test">测试面板</a>
    <a href="/health" target="_blank">健康检查</a>
    <a href="/h2-console" target="_blank">H2 Console</a>
</nav>

<div th:fragment="alert(msg, error)" xmlns:th="http://www.thymeleaf.org">
    <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${msg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<script th:fragment="script" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
