spring.application.name=phone

# 阿里云API配置（通过环境变量注入，避免明文泄露）
aliyun.access-key-id=${ALIYUN_ACCESS_KEY_ID}
aliyun.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET}
aliyun.region=cn-hangzhou

# 语音模板配置
aliyun.voice.template-code=TTS_313570112
aliyun.voice.called-numbers=${ALIYUN_CALLED_NUMBERS}

# Webhook认证密钥（通过环境变量注入）
alert.webhook.api-key=${ALERT_WEBHOOK_API_KEY:}

# 语音呼叫速率限制（每秒最大请求数）
alert.rate-limit.permits-per-second=5

server.port=8001
