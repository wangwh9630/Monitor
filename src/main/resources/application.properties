spring.application.name=phone

# 阿里云API配置（通过环境变量注入，避免明文泄露）
aliyun.access-key-id=${ALIYUN_ACCESS_KEY_ID}
aliyun.access-key-secret=${ALIYUN_ACCESS_KEY_SECRET}
aliyun.region=cn-hangzhou

# 语音模板配置（默认值，可在前端管理页面动态切换）
aliyun.voice.template-code=TTS_313570112

# Webhook认证密钥（通过环境变量注入）
alert.webhook.api-key=${ALERT_WEBHOOK_API_KEY:}

# 语音呼叫速率限制（每秒最大请求数）
alert.rate-limit.permits-per-second=5

server.port=8001

# H2 数据库
spring.datasource.url=jdbc:h2:file:./data/monitor;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${H2_DB_PASSWORD:monitor@2024}
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false
